name: Flutter CI/CD Build APK Release

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Java Development Kit (JDK)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Build Runner (Isar Generator)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run Unit Tests
        run: flutter test

      - name: Build APK PROD Release
        run: flutter build apk --release --dart-define=ENV_NAME=PROD --dart-define=APP_NAME="UTD - 20123009"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk